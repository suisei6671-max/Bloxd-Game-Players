<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd.io CCU Analyzer & Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans tracking-wide">

    <div class="max-w-6xl mx-auto px-6 py-12">
        
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-800 pb-8 mb-12 gap-6">
            <div>
                <h1 class="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 flex items-center gap-4">
                    <i class="fa-solid fa-chart-pie text-amber-400"></i> Bloxd.io Live CCU Visualizer
                </h1>
                <p class="text-slate-400 text-sm mt-2 font-medium">1000人スタック型グラフ（ホバーで合計表示）＆ PNGダウンロード対応版</p>
            </div>
            <button id="refresh-btn" class="bg-amber-600 hover:bg-amber-500 text-white px-6 py-3.5 text-sm font-bold rounded-xl shadow-xl shadow-amber-500/10 transition-all flex items-center justify-center gap-3 self-start sm:self-auto cursor-pointer">
                <i class="fa-solid fa-sync"></i> データを更新
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="md:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-8 flex items-center justify-between shadow-2xl">
                <div>
                    <h2 class="text-xs font-bold text-slate-500 tracking-widest uppercase">現在の総プレイヤー数 (Total CCU)</h2>
                    <div class="flex items-center gap-3 mt-3">
                        <span class="w-2.5 h-2.5 rounded-full bg-slate-500" id="status-dot"></span>
                        <span id="fetch-status" class="text-xs text-slate-400 font-bold">準備完了</span>
                    </div>
                </div>
                <div id="total-ccu" class="text-6xl font-black text-amber-400 font-mono tracking-tighter">0</div>
            </div>
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 flex flex-col justify-center font-mono text-xs text-slate-400 space-y-2 shadow-2xl">
                <div><span class="text-slate-600 font-bold">BYPASS:</span> JSONP INJECTION</div>
                <div><span class="text-slate-600 font-bold">TUNNEL:</span> GOOGLE APPS SCRIPT</div>
                <div id="last-updated"><span class="text-slate-600 font-bold">UPDATE:</span> --:--:--</div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 mb-12 shadow-2xl">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-8">
                <h3 class="text-base font-bold text-slate-200 flex items-center gap-3">
                    <i class="fa-solid fa-chart-bar text-orange-400"></i> モード別接続人数 (1,000人区切りスタック)
                </h3>
                
                <div class="flex flex-wrap items-center gap-4">
                    <button id="download-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-4 py-2 text-xs font-bold rounded-xl transition-all flex items-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-file-image text-emerald-400"></i> PNGで保存
                    </button>

                    <div class="inline-flex rounded-xl p-1 bg-slate-950 border border-slate-800">
                        <button id="btn-bar" class="px-5 py-2 text-xs font-bold rounded-lg transition-all bg-amber-600 text-white flex items-center gap-2 cursor-pointer">
                            <i class="fa-solid fa-chart-bar"></i> 横棒スタック
                        </button>
                        <button id="btn-pie" class="px-5 py-2 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200 flex items-center gap-2 cursor-pointer">
                            <i class="fa-solid fa-chart-pie"></i> 円グラフ
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="relative w-full h-[650px] bg-slate-900 rounded-xl p-2">
                <canvas id="ccuChart"></canvas>
            </div>
        </div>

        <div id="ccu-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-16 text-slate-600 text-sm border border-dashed border-slate-800 rounded-2xl">
                <i class="fa-solid fa-cloud-arrow-down text-3xl mb-3 block text-slate-700"></i>
                データを読み込み中...
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbysFHfPxonYbHLHKx-NQsWv16Rg_LjYGcL7BPiodbtr0TymgTtXmr6q5pXrXjcSTtREJg/exec';

        const grid = document.getElementById('ccu-grid');
        const totalCcu = document.getElementById('total-ccu');
        const fetchStatus = document.getElementById('fetch-status');
        const statusDot = document.getElementById('status-dot');
        const lastUpdated = document.getElementById('last-updated');
        const refreshBtn = document.getElementById('refresh-btn');
        const downloadBtn = document.getElementById('download-btn');
        const btnBar = document.getElementById('btn-bar');
        const btnPie = document.getElementById('btn-pie');
        
        let ccuChart = null; 
        let currentChartType = 'bar'; 
        let rawSortedData = []; 

        const chartColors = [
            '#f59e0b', '#3b82f6', '#10b981', '#ec4899', '#8b5cf6', 
            '#06b6d4', '#f43f5e', '#14b8a6', '#a855f7', '#6366f1',
            '#64748b', '#e2e8f0', '#f97316', '#22c55e', '#a1a1aa'
        ];

        // グラフの描画・更新
        function updateChart() {
            const ctx = document.getElementById('ccuChart').getContext('2d');
            if (ccuChart) ccuChart.destroy();

            const isBar = currentChartType === 'bar';

            let labels = rawSortedData.map(item => item.cleanName);
            let datasets = [];

            if (isBar) {
                // 最大の人数に合わせて何ブロック（何スタック）必要か計算
                const maxCount = rawSortedData.length > 0 ? rawSortedData[0].count : 0;
                const maxChunks = Math.max(1, Math.ceil(maxCount / 1000));

                // 1000人ごとのデータレイヤー（Dataset）を生成
                for (let i = 0; i < maxChunks; i++) {
                    let chunkData = rawSortedData.map(item => {
                        let start = i * 1000;
                        if (item.count <= start) return 0;
                        return Math.min(item.count - start, 1000);
                    });

                    datasets.push({
                        label: `${i * 1000 + 1}～${(i + 1) * 1000}人目`,
                        data: chunkData,
                        // グラデーション風に見せるため、ブロックごとに透明度を変更
                        backgroundColor: `rgba(245, 158, 11, ${0.4 - (i * 0.12)})`, 
                        borderColor: 'rgba(245, 158, 11, 1)',
                        borderWidth: 1,
                        stack: 'ccu' // これで同じ行に積み上がる
                    });
                }
            } else {
                // 円グラフ
                datasets.push({
                    data: rawSortedData.map(item => item.count),
                    backgroundColor: chartColors,
                    borderColor: '#0f172a',
                    borderWidth: 2
                });
            }

            ccuChart = new Chart(ctx, {
                type: isBar ? 'bar' : 'pie',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    indexAxis: isBar ? 'y' : 'x',
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { left: isBar ? 10 : 0, right: isBar ? 30 : 0, top: 10, bottom: 10 }
                    },
                    plugins: {
                        legend: { display: false }, // 上部の凡例は邪魔なので非表示
                        tooltip: {
                            // 【超重要】カーソルを合わせたら合計値をドバっと表示するカスタム設定
                            callbacks: {
                                title: function(context) {
                                    return context[0].label; // ゲームモード名
                                },
                                label: function(context) {
                                    if (isBar) {
                                        // 全スタックの合計（＝本来の人数）を計算して表示
                                        const modeIndex = context.dataIndex;
                                        const totalScore = rawSortedData[modeIndex].count;
                                        return ` 合計プレイヤー数: ${totalScore.toLocaleString()} 人`;
                                    } else {
                                        return ` プレイヤー数: ${context.raw.toLocaleString()} 人`;
                                    }
                                }
                            }
                        }
                    },
                    scales: isBar ? {
                        x: {
                            min: 0,
                            max: 1000, // 横軸の目盛り上限はしっかり1000固定！
                            grid: { color: 'rgba(51, 65, 85, 0.3)' },
                            ticks: { color: '#94a3b8', font: { family: 'monospace' } }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { 
                                color: '#f1f5f9', 
                                font: { size: 12, weight: '700' },
                                autoSkip: false,
                                padding: 15
                            }
                        }
                    } : {
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        }

        // PNGダウンロード機能 (背景を透過させず暗闇サイバーにするためのラッパー付き)
        downloadBtn.addEventListener('click', () => {
            if (!ccuChart) return;
            
            // 新しい一時的なキャンバスを作って背景色(Slate-900)を塗ることで、文字やバーが綺麗に写るようにする
            const canvas = document.getElementById('ccuChart');
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            // 背景色を塗りつぶし
            tempCtx.fillStyle = '#0f172a';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            // 現在のグラフを描画
            tempCtx.drawImage(canvas, 0, 0);
            
            // ダウンロード用リンクを作って発火
            const a = document.createElement('a');
            a.href = tempCanvas.toDataURL('image/png');
            a.download = `Bloxd_CCU_Graph_${new Date().toISOString().slice(0,10)}.png`;
            a.click();
        });

        window.handleBloxdData = function(data) {
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();

            if (data.error) {
                showError(data.error);
                return;
            }

            try {
                grid.innerHTML = '';
                let total = 0;

                rawSortedData = Object.keys(data).map(mode => ({
                    rawName: mode,
                    cleanName: mode.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
                    count: parseInt(data[mode]) || 0
                })).sort((a, b) => b.count - a.count);

                rawSortedData.forEach(item => {
                    total += item.count;

                    const card = document.createElement('div');
                    card.className = 'bg-slate-900/40 border border-slate-800/80 p-5 rounded-2xl flex justify-between items-center hover:border-slate-700 transition-all gap-4 shadow-lg';
                    card.innerHTML = `
                        <div class="min-w-0 flex-1">
                            <div class="font-bold text-slate-100 text-base truncate pb-1">${item.cleanName}</div>
                            <div class="text-[10px] text-slate-500 font-mono truncate">${item.rawName}</div>
                        </div>
                        <div class="font-mono font-black text-amber-400 bg-amber-400/5 px-4 py-2 rounded-xl border border-amber-400/10 shrink-0 text-base">
                            ${item.count.toLocaleString()}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                totalCcu.textContent = total.toLocaleString();
                updateChart();

                fetchStatus.textContent = "ライブデータ同期中";
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/50";
                
                const now = new Date();
                lastUpdated.innerHTML = `<span class="text-slate-600">UPDATE:</span> ${now.toLocaleTimeString()}`;
            } catch (e) {
                showError(e.message);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = `<i class="fa-solid fa-sync"></i> データを更新`;
            }
        };

        function showError(msg) {
            grid.innerHTML = `
                <div class="col-span-full bg-red-950/20 border border-red-900/40 rounded-2xl p-10 text-center text-red-400 text-sm">
                    <i class="fa-solid fa-triangle-exclamation text-3xl mb-3 block text-red-500"></i>
                    <span class="font-bold text-base">データの取得に失敗しました</span><br>
                    <span class="text-xs text-slate-500 font-mono mt-2 block">原因: ${msg}</span>
                </div>
            `;
            fetchStatus.textContent = "エラー発生";
            statusDot.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow-lg shadow-red-500/50";
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = `<i class="fa-solid fa-sync"></i> データを更新`;
        }

        function fetchBloxdCCU() {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 同期中...`;
            fetchStatus.textContent = "最新データをロード中...";
            statusDot.className = "w-2.5 h-2.5 rounded-full bg-amber-500 animate-pulse";

            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = `${GAS_URL}?callback=handleBloxdData&_=${new Date().getTime()}`;
            document.body.appendChild(script);
        }

        btnBar.addEventListener('click', () => {
            if (currentChartType === 'bar') return;
            currentChartType = 'bar';
            btnBar.className = "px-5 py-2 text-xs font-bold rounded-lg transition-all bg-amber-600 text-white flex items-center gap-2 cursor-pointer";
            btnPie.className = "px-5 py-2 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200 flex items-center gap-2 cursor-pointer";
            updateChart();
        });

        btnPie.addEventListener('click', () => {
            if (currentChartType === 'pie') return;
            currentChartType = 'pie';
            btnPie.className = "px-5 py-2 text-xs font-bold rounded-lg transition-all bg-amber-600 text-white flex items-center gap-2 cursor-pointer";
            btnBar.className = "px-5 py-2 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200 flex items-center gap-2 cursor-pointer";
            updateChart();
        });

        refreshBtn.addEventListener('click', fetchBloxdCCU);

        window.addEventListener('DOMContentLoaded', () => {
            fetchBloxdCCU();
            setInterval(fetchBloxdCCU, 30000);
        });
    </script>
</body>
</html>
