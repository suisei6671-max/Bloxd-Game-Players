<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd.io CCU Analyzer & Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div class="max-w-[1000px] mx-auto px-4 py-8">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 flex items-center gap-3">
                    <i class="fa-solid fa-chart-pie text-amber-400"></i> Bloxd.io Live CCU Visualizer
                </h1>
                <p class="text-slate-400 text-xs mt-1">横幅を最適化し、グラフ形式の切り替えに対応しました</p>
            </div>
            <button id="refresh-btn" class="bg-amber-600 hover:bg-amber-500 text-white px-5 py-2.5 text-sm font-semibold rounded-xl shadow-lg shadow-amber-500/10 transition-all flex items-center justify-center gap-2 self-start sm:self-auto">
                <i class="fa-solid fa-sync"></i> データを更新
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="md:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-6 flex items-center justify-between">
                <div>
                    <h2 class="text-xs font-bold text-slate-400 tracking-wider uppercase">現在の総プレイヤー数 (Total CCU)</h2>
                    <div class="flex items-center gap-2 mt-1.5">
                        <span class="w-2 h-2 rounded-full bg-slate-500" id="status-dot"></span>
                        <span id="fetch-status" class="text-xs text-slate-400 font-medium">準備完了</span>
                    </div>
                </div>
                <div id="total-ccu" class="text-5xl font-black text-amber-400 font-mono tracking-tighter">0</div>
            </div>
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col justify-center font-mono text-xs text-slate-400 space-y-1">
                <div><span class="text-slate-600">BYPASS:</span> JSONP INJECTION</div>
                <div><span class="text-slate-600">TUNNEL:</span> GOOGLE APPS SCRIPT</div>
                <div id="last-updated"><span class="text-slate-600">UPDATE:</span> --:--:--</div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-8">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                <h3 class="text-sm font-bold text-slate-300 flex items-center gap-2">
                    <i class="fa-solid fa-chart-bar text-orange-400"></i> モード別接続人数グラフ
                </h3>
                <div class="inline-flex rounded-xl p-1 bg-slate-950 border border-slate-800 self-start sm:self-auto">
                    <button id="btn-bar" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-amber-600 text-white flex items-center gap-1.5">
                        <i class="fa-solid fa-chart-bar"></i> 横棒
                    </button>
                    <button id="btn-pie" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200 flex items-center gap-1.5">
                        <i class="fa-solid fa-chart-pie"></i> 円グラフ
                    </button>
                </div>
            </div>
            <div class="relative w-full h-[450px]">
                <canvas id="ccuChart"></canvas>
            </div>
        </div>

        <div id="ccu-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            <div class="col-span-full text-center py-12 text-slate-600 text-sm border border-dashed border-slate-800 rounded-2xl">
                <i class="fa-solid fa-cloud-arrow-down text-2xl mb-2 block text-slate-700"></i>
                データを読み込み中...
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbysFHfPxonYbHLHKx-NQsWv16Rg_LjYGcL7BPiodbtr0TymgTtXmr6q5pXrXjcSTtREJg/exec';

        const grid = document.getElementById('ccu-grid');
        const totalCcu = document.getElementById('total-ccu');
        const fetchStatus = document.getElementById('fetch-status');
        const statusDot = document.getElementById('status-dot');
        const lastUpdated = document.getElementById('last-updated');
        const refreshBtn = document.getElementById('refresh-btn');
        const btnBar = document.getElementById('btn-bar');
        const btnPie = document.getElementById('btn-pie');
        
        let ccuChart = null; 
        let currentChartType = 'bar'; // 現在のグラフ形式 ('bar' または 'pie')
        let latestLabels = [];
        let latestDataValues = [];

        // 円グラフ用のカラフルなパレット
        const chartColors = [
            '#f59e0b', '#3b82f6', '#10b981', '#ec4899', '#8b5cf6', 
            '#06b6d4', '#f43f5e', '#14b8a6', '#a855f7', '#6366f1',
            '#64748b', '#e2e8f0', '#f97316', '#22c55e', '#000000'
        ];

        // グラフの描画・更新
        function updateChart() {
            const ctx = document.getElementById('ccuChart').getContext('2d');
            if (ccuChart) ccuChart.destroy();

            const isBar = currentChartType === 'bar';

            ccuChart = new Chart(ctx, {
                type: isBar ? 'bar' : 'pie',
                data: {
                    labels: latestLabels,
                    datasets: [{
                        label: 'プレイヤー数',
                        data: latestDataValues,
                        backgroundColor: isBar ? 'rgba(245, 158, 11, 0.2)' : chartColors,
                        borderColor: isBar ? 'rgba(245, 158, 11, 1)' : '#0f172a', // 円グラフの時はスリットを背景色に
                        borderWidth: 2,
                        borderRadius: isBar ? 6 : 0,
                        hoverBackgroundColor: isBar ? 'rgba(245, 158, 11, 0.4)' : undefined
                    }]
                },
                options: {
                    indexAxis: isBar ? 'y' : 'x', // 横棒の時だけ軸を反転
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: !isBar, // 円グラフの時だけ凡例（ゲーム名一覧）を出す
                            position: 'right',
                            labels: {
                                color: '#e2e8f0',
                                font: { size: 11, weight: 'bold' },
                                boxWidth: 12
                            }
                        }
                    },
                    scales: isBar ? {
                        x: {
                            grid: { color: 'rgba(51, 65, 85, 0.3)' },
                            ticks: { color: '#94a3b8', font: { family: 'monospace' } }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { 
                                color: '#e2e8f0', 
                                font: { weight: 'bold' },
                                // 【超重要】名前が長いときに途中で切らさず、自動で折り返して全表示する設定
                                autoSkip: false,
                                maxRotation: 0,
                                callback: function(value) {
                                    const label = this.getLabelForValue(value);
                                    if (label.length > 12) {
                                        // 12文字以上の場合は配列にして返すことでChart.jsが自動折り返し処理をします
                                        return [label.substring(0, 12), label.substring(12)];
                                    }
                                    return label;
                                }
                            }
                        }
                    } : {
                        // 円グラフの時は目盛り軸を完全に非表示にする
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        }

        // GASからデータを受け取るグローバル関数
        window.handleBloxdData = function(data) {
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();

            if (data.error) {
                showError(data.error);
                return;
            }

            try {
                grid.innerHTML = '';
                let total = 0;

                latestLabels = [];
                latestDataValues = [];

                // 降順にソート
                const sortedModes = Object.keys(data).map(mode => ({
                    rawName: mode,
                    cleanName: mode.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
                    count: parseInt(data[mode]) || 0
                })).sort((a, b) => b.count - a.count);

                sortedModes.forEach(item => {
                    total += item.count;
                    latestLabels.push(item.cleanName);
                    latestDataValues.push(item.count);

                    // カードUI（flex/wrapを意識し、長い文字でも改行して絶対崩れない設計）
                    const card = document.createElement('div');
                    card.className = 'bg-slate-900/40 border border-slate-800/80 p-4 rounded-xl flex justify-between items-center hover:border-slate-700 transition-colors gap-2';
                    card.innerHTML = `
                        <div class="min-w-0 flex-1">
                            <div class="font-bold text-slate-200 text-sm break-words whitespace-normal">${item.cleanName}</div>
                            <div class="text-[10px] text-slate-500 font-mono truncate">${item.rawName}</div>
                        </div>
                        <div class="font-mono font-bold text-amber-400 bg-amber-400/5 px-3 py-1 rounded-lg border border-amber-400/10 shrink-0">
                            ${item.count.toLocaleString()}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                totalCcu.textContent = total.toLocaleString();
                
                // グラフを描画
                updateChart();

                fetchStatus.textContent = "ライブデータ同期中";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/50";
                
                const now = new Date();
                lastUpdated.innerHTML = `<span class="text-slate-600">UPDATE:</span> ${now.toLocaleTimeString()}`;
            } catch (e) {
                showError(e.message);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = `<i class="fa-solid fa-sync"></i> データを更新`;
            }
        };

        function showError(msg) {
            grid.innerHTML = `
                <div class="col-span-full bg-red-950/20 border border-red-900/40 rounded-2xl p-8 text-center text-red-400 text-sm">
                    <i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block text-red-500"></i>
                    <span class="font-bold">データの取得に失敗しました</span><br>
                    <span class="text-xs text-slate-500 font-mono mt-1 block">原因: ${msg}</span>
                </div>
            `;
            fetchStatus.textContent = "エラー発生";
            statusDot.className = "w-2 h-2 rounded-full bg-red-500 shadow-lg shadow-red-500/50";
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = `<i class="fa-solid fa-sync"></i> データを更新`;
        }

        function fetchBloxdCCU() {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 同期中...`;
            fetchStatus.textContent = "最新データをロード中...";
            statusDot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";

            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = `${GAS_URL}?callback=handleBloxdData&_=${new Date().getTime()}`;
            
            script.onerror = function() {
                showError("スクリプトの読み込みに失敗しました。");
            };

            document.body.appendChild(script);
        }

        // ボタン切り替えイベントの登録
        btnBar.addEventListener('click', () => {
            if (currentChartType === 'bar') return;
            currentChartType = 'bar';
            btnBar.className = "px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-amber-600 text-white flex items-center gap-1.5";
            btnPie.className = "px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200 flex items-center gap-1.5";
            updateChart();
        });

        btnPie.addEventListener('click', () => {
            if (currentChartType === 'pie') return;
            currentChartType = 'pie';
            btnPie.className = "px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-amber-600 text-white flex items-center gap-1.5";
            btnBar.className = "px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200 flex items-center gap-1.5";
            updateChart();
        });

        refreshBtn.addEventListener('click', fetchBloxdCCU);

        window.addEventListener('DOMContentLoaded', () => {
            fetchBloxdCCU();
            setInterval(fetchBloxdCCU, 30000);
        });
    </script>
</body>
</html>
