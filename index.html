<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd.io - Game CCU Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse-dot {
            animation: pulse-soft 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 flex items-center gap-3">
                    <i class="fa-solid fa-gamepad text-cyan-400"></i> Bloxd.io CCU Monitor
                </h1>
                <p class="text-slate-400 text-sm mt-1">ゲームモードごとの同時接続プレイヤー数をリアルタイムで表示します</p>
            </div>
            <div class="flex items-center gap-3 self-start md:self-auto">
                <span id="status-badge" class="px-3 py-1 text-xs font-bold rounded-full bg-slate-800 text-slate-400 flex items-center gap-1.5">
                    <span class="w-2 height-2 rounded-full bg-slate-500 pulse-dot"></span>
                    <span>未読込</span>
                </span>
                <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 text-sm font-semibold rounded-lg shadow-md transition-all flex items-center gap-2">
                    <i class="fa-solid fa-rotate"></i> 更新
                </button>
            </div>
        </header>

        <main>
            <div id="message-container" class="hidden mb-6 p-4 rounded-xl text-sm border"></div>

            <div class="bg-gradient-to-br from-slate-800 to-slate-850 border border-slate-700/50 rounded-2xl p-6 mb-8 shadow-xl flex flex-col sm:flex-row items-center justify-between gap-4">
                <div>
                    <h2 class="text-lg font-bold text-slate-300">現在の総プレイヤー数 (Total CCU)</h2>
                    <p class="text-xs text-slate-400 mt-1">すべてのゲームモードの合計数値</p>
                </div>
                <div id="total-ccu" class="text-4xl md:text-5xl font-black text-cyan-400 font-mono tracking-tight">
                    0
                </div>
            </div>

            <h3 class="text-sm font-bold tracking-widest text-slate-400 uppercase mb-4">Game Modes</h3>
            <div id="ccu-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <div class="col-span-full text-center py-12 text-slate-500">
                    <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 block text-blue-500"></i>
                    データを読み込んでいます...
                </div>
            </div>
        </main>

        <footer class="mt-12 pt-6 border-t border-slate-800 text-center text-xs text-slate-500 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
                取得先データURL: <a href="https://social6.bloxd.io/social/get-game-ccus" target="_blank" class="text-blue-400 hover:underline font-mono">social/get-game-ccus</a>
            </div>
            <div class="flex items-center gap-4">
                <span id="last-updated">最終更新: --:--:--</span>
                <button id="toggle-dummy-btn" class="text-slate-600 hover:text-slate-400 transition-colors">
                    [デバッグ用ダミーデータをロード]
                </button>
            </div>
        </footer>
    </div>

    <script>
        const API_URL = 'https://social6.bloxd.io/social/get-game-ccus';
        // CORS対策のための公開プロキシ（うまく動かない場合のフォールバック用）
        const PROXY_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(API_URL);

        const gridElement = document.getElementById('ccu-grid');
        const totalElement = document.getElementById('total-ccu');
        const statusBadge = document.getElementById('status-badge');
        const lastUpdatedElement = document.getElementById('last-updated');
        const messageContainer = document.getElementById('message-container');
        const refreshBtn = document.getElementById('refresh-btn');
        const dummyBtn = document.getElementById('toggle-dummy-btn');

        // ダミーデータ（APIがCORSやサーバー落ちで取得できない時用）
        const dummyData = {
            "survival": 3412,
            "peaceful": 894,
            "creative": 1205,
            "bedwars": 4120,
            "skywars": 650,
            "oneblock": 1840,
            "worlds": 2930,
            "cube-craft": 410,
            "murder-mystery": 780
        };

        // データを画面に反映する関数
        function renderData(data) {
            gridElement.innerHTML = '';
            let total = 0;

            // 各ゲームモードのカードを作成
            Object.keys(data).forEach(mode => {
                const ccuValue = parseInt(data[mode]) || 0;
                total += ccuValue;

                // ゲーム名を見やすくパース (例: "cube-craft" -> "Cube Craft")
                const formattedName = mode.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

                const card = document.createElement('div');
                card.className = 'bg-slate-800/60 border border-slate-700/40 hover:border-slate-600/60 rounded-xl p-4 shadow-sm transition-all duration-200 flex items-center justify-between';
                card.innerHTML = `
                    <div>
                        <div class="font-bold text-slate-200">${formattedName}</div>
                        <div class="text-[10px] text-slate-500 font-mono mt-0.5">${mode}</div>
                    </div>
                    <div class="text-xl font-bold font-mono text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-lg">
                        ${ccuValue.toLocaleString()}
                    </div>
                `;
                gridElement.appendChild(card);
            });

            // トータルCCUの反映
            totalElement.textContent = total.toLocaleString();
            
            // 最終更新時間の更新
            const now = new Date();
            lastUpdatedElement.textContent = `最終更新: ${now.toLocaleTimeString()}`;
        }

        // メッセージを表示する関数
        function showMessage(text, type = 'error') {
            messageContainer.className = `mb-6 p-4 rounded-xl text-sm border ${
                type === 'error' ? 'bg-red-500/10 border-red-500/30 text-red-400' : 
                type === 'warning' ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' : 
                'bg-emerald-500/10 border-emerald-500/30 text-emerald-400'
            }`;
            messageContainer.innerHTML = text;
            messageContainer.classList.remove('hidden');
        }

        function hideMessage() {
            messageContainer.classList.add('hidden');
        }

        // ステータスバッジの変更
        function updateStatus(state, label) {
            const dot = statusBadge.querySelector('span:first-child');
            const text = statusBadge.querySelector('span:last-child');
            text.textContent = label;
            
            dot.className = 'w-2 h-2 rounded-full pulse-dot ';
            if(state === 'success') {
                statusBadge.className = "px-3 py-1 text-xs font-bold rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                dot.classList.add('bg-emerald-400');
            } else if (state === 'proxy') {
                statusBadge.className = "px-3 py-1 text-xs font-bold rounded-full bg-amber-500/10 text-amber-400 border border-amber-500/20";
                dot.classList.add('bg-amber-400');
            } else if (state === 'error') {
                statusBadge.className = "px-3 py-1 text-xs font-bold rounded-full bg-red-500/10 text-red-400 border border-red-500/20";
                dot.classList.add('bg-red-400');
            } else {
                statusBadge.className = "px-3 py-1 text-xs font-bold rounded-full bg-slate-800 text-slate-400";
                dot.classList.add('bg-slate-500');
            }
        }

        // メインのデータフェッチ処理
        async function fetchCCUData() {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 読込中...`;
            hideMessage();

            // 1. まずは直接APIへのフェッチを試みる
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const data = await response.json();
                
                renderData(data);
                updateStatus('success', 'オンライン (直接取得)');
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = `<i class="fa-solid fa-rotate"></i> 更新`;
                return;
            } catch (directError) {
                console.warn("直接アクセスに失敗しました。プロキシ経由を試みます...", directError);
                
                // 2. 直接取得が失敗（CORSなど）した場合、プロキシサーバーを経由して再試行
                try {
                    const proxyResponse = await fetch(PROXY_URL);
                    if (!proxyResponse.ok) throw new Error(`Proxy HTTP Error: ${proxyResponse.status}`);
                    const data = await proxyResponse.json();
                    
                    renderData(data);
                    updateStatus('proxy', 'オンライン (プロキシ経由)');
                    showMessage(`<i class="fa-solid fa-circle-info"></i> ブラウザのCORS制限を回避するため、自動的に公開プロキシサーバーを経由してデータを読み込みました。`, 'warning');
                    refreshBtn.disabled = false;
                    refreshBtn.innerHTML = `<i class="fa-solid fa-rotate"></i> 更新`;
                    return;
                } catch (proxyError) {
                    console.error("プロキシ経由の取得にも失敗しました:", proxyError);
                    
                    updateStatus('error', 'オフライン / 読込失敗');
                    showMessage(`
                        <div class="font-bold mb-1"><i class="fa-solid fa-triangle-exclamation"></i> データの取得に失敗しました</div>
                        <p class="text-xs opacity-90">原因として、Bloxd.ioサーバー側のCORS制限、または一時的なAPIダウンが考えられます。</p>
                        <button onclick="loadDummyData()" class="mt-2 bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-1 text-xs font-semibold rounded border border-slate-600 transition-all">
                            代わりにサンプルデータをロードして表示を確認する
                        </button>
                    `, 'error');
                }
            }
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = `<i class="fa-solid fa-rotate"></i> 更新`;
        }

        // デバッグ用ダミーデータを読み込む関数
        function loadDummyData() {
            hideMessage();
            renderData(dummyData);
            updateStatus('proxy', 'デモモード (ダミーデータ)');
            showMessage(`<i class="fa-solid fa-flask"></i> 現在表示されているデータは、APIが読み込めなかったための<b>デモ用サンプル（模擬データ）</b>です。`, 'warning');
        }

        // イベントリスナーの登録
        refreshBtn.addEventListener('click', fetchCCUData);
        dummyBtn.addEventListener('click', loadDummyData);

        // ページ読み込み時に実行
        window.addEventListener('DOMContentLoaded', () => {
            fetchCCUData();
            // 30秒ごとに自動更新
            setInterval(fetchCCUData, 30000);
        });
    </script>
</body>
</html>
