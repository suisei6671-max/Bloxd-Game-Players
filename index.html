<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd.io CCU Analyzer (Redirect Fix)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 flex items-center gap-3">
                    <i class="fa-solid fa-bolt text-cyan-400"></i> Bloxd.io Live CCU
                </h1>
                <p class="text-slate-400 text-xs mt-1">Googleの302リダイレクト追従処理を有効化しています</p>
            </div>
            <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 text-sm font-semibold rounded-xl shadow-lg shadow-blue-500/10 transition-all flex items-center justify-center gap-2 self-start sm:self-auto">
                <i class="fa-solid fa-sync"></i> データを取得
            </button>
        </header>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
                <h2 class="text-sm font-bold text-slate-400 tracking-wider uppercase">現在の総プレイヤー数 (Total CCU)</h2>
                <div class="flex items-center gap-2 mt-1.5">
                    <span class="w-2 h-2 rounded-full bg-slate-500" id="status-dot"></span>
                    <span id="fetch-status" class="text-xs text-slate-400 font-medium">準備完了</span>
                </div>
            </div>
            <div id="total-ccu" class="text-5xl font-black text-cyan-400 font-mono tracking-tighter">0</div>
        </div>

        <div id="ccu-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            <div class="col-span-full text-center py-12 text-slate-600 text-sm border border-dashed border-slate-800 rounded-2xl">
                <i class="fa-solid fa-cloud-arrow-down text-2xl mb-2 block text-slate-700"></i>
                最初のデータをリクエスト中...
            </div>
        </div>

        <footer class="mt-12 pt-6 border-t border-slate-900 text-center text-xs text-slate-600 flex justify-between items-center font-mono">
            <span id="last-updated">LAST UPDATE: --:--:--</span>
            <span class="text-emerald-400">⚡ REDIRECT FOLLOW ACTIVE</span>
        </footer>
    </div>

    <script>
        // あなたが新しく発行してくれた最新のGAS URLです
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbysFHfPxonYbHLHKx-NQsWv16Rg_LjYGcL7BPiodbtr0TymgTtXmr6q5pXrXjcSTtREJg/exec';

        const grid = document.getElementById('ccu-grid');
        const totalCcu = document.getElementById('total-ccu');
        const fetchStatus = document.getElementById('fetch-status');
        const statusDot = document.getElementById('status-dot');
        const lastUpdated = document.getElementById('last-updated');
        const refreshBtn = document.getElementById('refresh-btn');

        async function fetchBloxdCCU() {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 読込中...`;
            fetchStatus.textContent = "Googleサーバーのリダイレクトを追従中...";
            statusDot.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse";

            try {
                // Googleの302 Foundを突破するために、明示的にPOSTメソッド＋リダイレクト追従を設定
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    redirect: 'follow', // ← これで302 Foundの先のURLを自動で追いかけます
                    body: JSON.stringify({})
                });

                if (!response.ok) {
                    throw new Error(`GAS Error! Status: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // 画面の更新処理
                grid.innerHTML = '';
                let total = 0;

                Object.keys(data).forEach(mode => {
                    const count = parseInt(data[mode]) || 0;
                    total += count;
                    const cleanName = mode.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

                    const card = document.createElement('div');
                    card.className = 'bg-slate-900/40 border border-slate-800/80 p-4 rounded-xl flex justify-between items-center hover:border-slate-700 transition-colors';
                    card.innerHTML = `
                        <div>
                            <div class="font-bold text-slate-200 text-sm">${cleanName}</div>
                            <div class="text-[10px] text-slate-500 font-mono">${mode}</div>
                        </div>
                        <div class="font-mono font-bold text-cyan-400 bg-cyan-400/5 px-3 py-1 rounded-lg border border-cyan-500/10">
                            ${count.toLocaleString()}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // トータル数の反映
                totalCcu.textContent = total.toLocaleString();
                
                // ステータス表示の更新
                fetchStatus.textContent = "データ取得成功";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/50";
                
                const now = new Date();
                lastUpdated.textContent = `LAST UPDATE: ${now.toLocaleTimeString()}`;

            } catch (error) {
                console.error(error);
                grid.innerHTML = `
                    <div class="col-span-full bg-red-950/20 border border-red-900/40 rounded-2xl p-8 text-center text-red-400 text-sm">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block text-red-500"></i>
                        <span class="font-bold">データの取得に失敗しました</span><br>
                        <span class="text-xs text-slate-500 font-mono mt-1 block">原因: ${error.message}</span>
                    </div>
                `;
                fetchStatus.textContent = "エラー発生";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500 shadow-lg shadow-red-500/50";
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = `<i class="fa-solid fa-sync"></i> データを取得`;
            }
        }

        refreshBtn.addEventListener('click', fetchBloxdCCU);

        window.addEventListener('DOMContentLoaded', () => {
            fetchBloxdCCU();
            setInterval(fetchBloxdCCU, 30000); // 30秒ごとに自動更新
        });
    </script>
</body>
</html>
